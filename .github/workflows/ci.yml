name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      fuzz_seconds:
        description: "Seconds to fuzz each harness"
        required: false
        default: "60"

jobs:
  unit-tests:
    name: Unit tests (no Docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc make shellcheck python3

      - name: Run unit test suite
        run: make clean && make test-unit

  fuzz-smoke:
    name: Fuzz smoke (libFuzzer + ASan/UBSan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang make tar

      # A short run of every harness over its committed corpus. The script
      # builds all targets via `make fuzz-all`, runs each for the given number
      # of seconds, and exits non-zero if any crash/leak/oom/timeout artifact
      # is produced. PRs get a quick smoke; nightly/dispatch can run longer.
      - name: Fuzz smoke
        env:
          FUZZ_CC: clang
        run: bash scripts/fuzz_run.sh "${{ github.event.inputs.fuzz_seconds || '60' }}"

      - name: Upload fuzz findings
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-findings
          path: build/fuzz-out/
          if-no-files-found: ignore
